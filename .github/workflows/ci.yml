name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      # Generated protobufs are committed; fail if they drift from the .proto source.
      - name: Verify generated protobufs are up to date
        run: |
          pnpm proto
          git diff --exit-code -- src/protobufs || (echo "::error::src/protobufs is stale — run 'pnpm proto' and commit" && exit 1)
